name: MLOps Python CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f Membangun_model/requirements.txt ]; then pip install -r Membangun_model/requirements.txt; fi

      - name: Code Verification Simulation
        run: |
          python -c "import joblib; print('✅ Verifikasi sukses: Model dan dependensi aman!')"
